<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%sveltekit.assets%/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tauri + SvelteKit App</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script>
    // Minimal script to prevent FOUC (Flash of Unstyled Content) if possible, 
    // or just let the store handle it. The store runs early enough usually.
    // But for best experience, we can check localStorage here.
    (function () {
      try {
        const saved = localStorage.getItem('gower-theme');
        const systemLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        let theme = saved || 'system';

        if (theme === 'system') {
          theme = systemLight ? 'light' : 'dark';
        }

        document.documentElement.classList.add(theme + '-theme');
      } catch (e) { console.error(e); }
    })();
  </script>
  %sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
  <div style="display: contents">%sveltekit.body%</div>
</body>

</html>
