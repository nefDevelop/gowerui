name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            binary_name: 'gower'
            sidecar_name: 'gower-x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            binary_name: 'gower.exe'
            sidecar_name: 'gower-x86_64-pc-windows-msvc.exe'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: install frontend dependencies
        run: npm install

      - name: get tauri version
        id: tauri_version
        shell: bash
        run: |
          VERSION=$(grep '"version":' src-tauri/tauri.conf.json | head -n 1 | cut -d '"' -f 4)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: fetch sidecar binary from nefDevelop/gower
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p src-tauri/binaries
          REPO="nefDevelop/gower"
          echo "Fetching latest release from $REPO..."
          LATEST_RELEASE_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" https://api.github.com/repos/$REPO/releases/latest)
          GOWER_VERSION=$(echo "$LATEST_RELEASE_JSON" | grep '"tag_name":' | head -n 1 | cut -d '"' -f 4)
          
          if [[ "${{ matrix.platform }}" == "ubuntu-22.04" ]]; then
            DOWNLOAD_URL=$(echo "$LATEST_RELEASE_JSON" | grep "browser_download_url" | grep "/gower\"" | head -n 1 | cut -d '"' -f 4)
          else
            DOWNLOAD_URL=$(echo "$LATEST_RELEASE_JSON" | grep "browser_download_url" | grep "/gower.exe\"" | head -n 1 | cut -d '"' -f 4)
          fi
          
          curl -L -H "Authorization: token $GH_TOKEN" "$DOWNLOAD_URL" -o src-tauri/binaries/${{ matrix.sidecar_name }}
          chmod +x src-tauri/binaries/${{ matrix.sidecar_name }} || true
          echo "{\"version\": \"$GOWER_VERSION\", \"repo\": \"$REPO\", \"binary\": \"${{ matrix.binary_name }}\"}" > src/lib/sidecar-info.json

      - name: build tauri app
        shell: bash
        run: |
          # Manual build to ensure binaries are created and visible
          npm run tauri build -- --target ${{ matrix.target }}

      - name: package portable (linux)
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          set -x
          mkdir -p gowerui-linux-portable
          # Robust binary discovery
          BINARY_PATH=$(find src-tauri/target -name gowerui -type f | grep release | grep -v bundle | grep -v deps | head -n 1)
          cp "$BINARY_PATH" gowerui-linux-portable/
          cp src-tauri/binaries/gower-x86_64-unknown-linux-gnu gowerui-linux-portable/gower
          cp src-tauri/icons/128x128.png gowerui-linux-portable/icon.png
          
          cat <<EOF > gowerui-linux-portable/gowerui.desktop
          [Desktop Entry]
          Name=Gower UI
          Comment=GUI for Gower Wallpaper Engine
          Exec=sh -c "cd \$(dirname %k) && ./gowerui"
          Icon=\$(dirname %k)/icon.png
          Terminal=false
          Type=Application
          Categories=Utility;Graphics;
          EOF

          cat <<EOF > gowerui-linux-portable/README.md
          # Gower UI - Portable Linux
          ## Ejecución: ./gowerui
          EOF

          chmod +x gowerui-linux-portable/gowerui gowerui-linux-portable/gower
          tar -czf gowerui-linux-portable.tar.gz gowerui-linux-portable/
          
          mkdir -p final-assets
          find src-tauri/target -name "*.deb" -exec cp {} final-assets/ \;
          find src-tauri/target -name "*.rpm" -exec cp {} final-assets/ \;
          find src-tauri/target -name "*.AppImage" -exec cp {} final-assets/ \;
          cp gowerui-linux-portable.tar.gz final-assets/

      - name: package portable (windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          set -x
          mkdir -p gowerui-windows-portable
          # Robust binary discovery for Windows
          BINARY_PATH=$(find src-tauri/target -name gowerui.exe -type f | grep release | grep -v bundle | grep -v deps | head -n 1)
          cp "$BINARY_PATH" gowerui-windows-portable/
          # Mantener el nombre completo del sidecar para que Tauri lo encuentre
          cp src-tauri/binaries/gower-x86_64-pc-windows-msvc.exe gowerui-windows-portable/gower-x86_64-pc-windows-msvc.exe
          
          # Crear un pequeño README explicativo
          echo "Ejecuta gowerui.exe para iniciar la aplicación." > gowerui-windows-portable/README.txt
          echo "No elimines gower-x86_64-pc-windows-msvc.exe, es el motor de la aplicación." >> gowerui-windows-portable/README.txt
          
          cd gowerui-windows-portable && 7z a ../gowerui-windows-portable.zip * && cd ..

          mkdir -p final-assets
          # ONLY copy from the bundle directory to avoid build scripts
          find src-tauri/target -path "*/release/bundle/*" -name "*.exe" -exec cp {} final-assets/ \; || true
          find src-tauri/target -path "*/release/bundle/*" -name "*.msi" -exec cp {} final-assets/ \; || true
          cp gowerui-windows-portable.zip final-assets/

      - name: upload all assets to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: final-assets/*
          tag_name: v${{ steps.tauri_version.outputs.version }}
          name: 'gowerui v${{ steps.tauri_version.outputs.version }}'
          body: 'Automatic release. Includes Portable, DEB, RPM, AppImage and MSI/EXE versions.'
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
